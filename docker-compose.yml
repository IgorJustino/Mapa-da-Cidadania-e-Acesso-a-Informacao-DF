services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mapa_cidadania_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mapa_cidadania}
      POSTGRES_USER: ${POSTGRES_USER:-mapa_cidadania_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mapa_cidadania_pass}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mapa_cidadania_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mapa_cidadania_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-mapa_cidadania_pgadmin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - mapa_cidadania_network

networks:
  mapa_cidadania_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
